name: open-webui-stack

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped

    environment:
      TZ: ${TZ}
      WEBUI_URL: "https://chat.faithmeats.org"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}

      # Trust the email Cloudflare Access injects (origin is loopback-only below,
      # so this header cannot be forged from outside the tunnel).
      WEBUI_AUTH_TRUSTED_EMAIL_HEADER: "Cf-Access-Authenticated-User-Email"

      # Global tool servers (mcpo bridges). NOTE: persistent config — after first
      # boot the live value is managed in the DB via the admin API/UI; this env
      # only seeds a fresh volume. Kept in sync manually (last: 2026-07-04).
      # Users still enable tools per-chat via the "+" menu (hidden by default).
      TOOL_SERVER_CONNECTIONS: '[{"type":"openapi","url":"http://allura-mcpo:8000","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"allura-memory","name":"Allura Memory","description":"FaithMeats governed org memory. Pass group_id=allura-faith-meats on every call."}},{"type":"openapi","url":"http://faithclaw-mcpo:8000","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"faithclaw-chat","name":"FaithClaw Assistant","description":"Chat with FaithClaw, the Faith Meats agent (gate-enforced). Send a message, get the assistant reply."}},{"type":"openapi","url":"http://openwebui-ro-mcpo:8000","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"openwebui-ro","name":"Web & Notion Search (read-only)","description":"Read-only research tools: Notion search/reads, Tavily web search, Exa web search. No write tools exist on this surface."}}]'

      # Business/security defaults
      ENABLE_API_KEYS: "true"
      ENABLE_SIGNUP: ${ENABLE_SIGNUP}
      DEFAULT_USER_ROLE: "user"
      ENABLE_PASSWORD_VALIDATION: ${ENABLE_PASSWORD_VALIDATION}
      PASSWORD_VALIDATION_REGEX_PATTERN: ${PASSWORD_VALIDATION_REGEX_PATTERN}
      PASSWORD_VALIDATION_HINT: ${PASSWORD_VALIDATION_HINT}

      # Faster failure if a bad model endpoint is configured
      AIOHTTP_CLIENT_TIMEOUT_MODEL_LIST: ${AIOHTTP_CLIENT_TIMEOUT_MODEL_LIST}

      # 4 GB box: do NOT download/run a local embedding model at boot.
      # Leaves RAG off until you point embeddings at a cloud provider.
      RAG_EMBEDDING_ENGINE: "ollama"
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"

      # Optional first-boot admin creation.
      # Blank these out after the first successful login.
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL}
      WEBUI_ADMIN_NAME: ${WEBUI_ADMIN_NAME}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD}

    volumes:
      - open-webui-data:/app/backend/data

    expose:
      - "8080"

    # Allow container to reach host-side services (Hermes API server on :8642)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Loopback only — reachable solely via the Cloudflare tunnel (closes LAN bypass).
    ports:
      - "127.0.0.1:8080:8080"

    # Tuned for a 4 GB / Pentium Silver N5030 box
    mem_limit: 1200m
    mem_reservation: 512m
    cpus: "1.50"

    security_opt:
      - no-new-privileges:true

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-open-webui
    restart: unless-stopped

    command: tunnel --no-autoupdate run

    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}

    depends_on:
      - open-webui

    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.50"

    security_opt:
      - no-new-privileges:true

  gog-mcpo-info:
    image: ghcr.io/open-webui/mcpo:main
    container_name: gog-mcpo-info
    restart: unless-stopped
    command: ["--host", "0.0.0.0", "--port", "8000", "--name", "Gmail - Info", "--description", "info@faithmeats.com inbox", "--", "/gog", "mcp", "--allow-write"]
    environment:
      GOG_KEYRING_BACKEND: file
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD}
      GOG_ACCOUNT: info@faithmeats.com
    volumes:
      - /home/roninhub/.local/bin/gog:/gog:ro
      - /home/roninhub/.local/share/gogcli:/root/.local/share/gogcli
    expose:
      - "8000"
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.50"
    security_opt:
      - no-new-privileges:true

  gog-mcpo-purchasing:
    image: ghcr.io/open-webui/mcpo:main
    container_name: gog-mcpo-purchasing
    restart: unless-stopped
    command: ["--host", "0.0.0.0", "--port", "8000", "--name", "Gmail - Purchasing", "--description", "purchasing@faithmeats.com inbox", "--", "/gog", "mcp", "--allow-write"]
    environment:
      GOG_KEYRING_BACKEND: file
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD}
      GOG_ACCOUNT: purchasing@faithmeats.com
    volumes:
      - /home/roninhub/.local/bin/gog:/gog:ro
      - /home/roninhub/.local/share/gogcli:/root/.local/share/gogcli
    expose:
      - "8000"
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.50"
    security_opt:
      - no-new-privileges:true

volumes:
  open-webui-data:
    name: open-webui-data
